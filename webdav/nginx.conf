load_module /usr/lib/nginx/modules/ngx_http_dav_ext_module.so;

user www-data;

events {}

http {
  client_body_temp_path /tmp/nginx_client_body;

  server {
    listen 80;

    location /dav/ {
      alias /data/dav/;

      dav_methods PUT DELETE MKCOL COPY MOVE;
      dav_ext_methods PROPFIND OPTIONS;
      dav_access user:rw group:r all:r;
      create_full_put_path on;
      autoindex on;

      auth_basic "WebDAV";
      auth_basic_user_file /etc/nginx/.htpasswd;

      add_header Access-Control-Allow-Origin "*" always;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, MKCOL, COPY, MOVE, PROPFIND, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Authorization, Content-Type, Depth, Overwrite, Destination" always;
      add_header Access-Control-Allow-Credentials "true" always;

      if ($request_method = OPTIONS) {
        return 204;
      }
    }
  }
}